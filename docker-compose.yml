services:
  web:
    build: .
    command: poetry run python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: 'med_diagnostic_site'
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: settings.PASSWORD
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
