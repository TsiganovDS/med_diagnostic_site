services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "9052:8000"
    environment:
      POSTGRES_DB: medsite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    depends_on:
      db:
        condition: service_healthy
    networks:
      - django-network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${NAME}
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: ${PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - django-network

networks:
  django-network:
    driver: bridge

volumes:
  postgres_data:
