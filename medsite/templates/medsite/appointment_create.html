{% extends 'medsite/base.html' %}
{% block title %}Кабинет пациента{% endblock %}
{% block content %}
    <title>Запись на прием</title>
    <!-- Подключаем стили Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4 text-center">Запись на прием</h2>

            <form method="post" action="{% url 'medsite:appointment_create' %}" class="shadow p-4 rounded bg-light">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="text-center mb-3">
                    <button type="submit" class="btn btn-primary w-100">Записаться</button>
                </div>
                {% if error %}
                    <p class="alert alert-danger">Ошибка: {{ error }}</p>
                {% endif %}
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% endblock %}
