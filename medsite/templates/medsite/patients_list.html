{% extends 'medsite/base.html' %}

{% block content %}
<h2>Список пациентов</h2>

<!-- Форма поиска -->
<form method="get" class="mb-3">
    <div class="input-group">
        <input type="text" 
               name="q" 
               placeholder="Поиск пациента" 
               value="{{ request.GET.q }}" 
               class="form-control">
        <button type="submit" class="btn btn-primary">Искать</button>
    </div>
</form>

<table class="table">
    <thead>
        <tr>
            <th>ФИО</th>
            <th>Email</th>
            <th>Телефон</th>
            <th>Действия</th> 
        </tr>
    </thead>
    <tbody>
        {% for patient in patients %}
            <tr>
                <td>{{ patient.get_full_name }}</td>
                <td>{{ patient.email }}</td>
                <td>{{ patient.phone }}</td>
                <td>
                    <!-- Кнопка записи на прием -->
                    <a href="{% url 'medsite:admin_appointment_form' patient.pk %}" 
                       class="btn btn-success btn-sm">
                        Записать на прием
                    </a>
                    <!-- Кнопка просмотра записей -->
                    <a href="{% url 'medsite:patient_appointments' patient.pk %}" 
                        class="btn btn-primary btn-sm">
                            Посмотреть записи
                    </a>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
