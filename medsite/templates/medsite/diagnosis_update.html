{% extends 'medsite/base.html' %}
{% block content %}
<h2>Обновление диагноза</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
</form>
<{% if appointment.diagnosis %}
    <a href="{% url 'medsite:diagnosis_update' appointment.pk appointment.diagnosis.pk %}">Редактировать диагноз</a>
{% else %}
    <a href="{% url 'medsite:diagnosis_create' appointment.pk %}">Добавить диагноз</a>
{% endif %}
{% endblock %}
