{% extends 'medsite/base.html' %}

{% block title %}Запись на прием{% endblock %}

{% block content %}
<div class="container mt-5">
    <h3>Запись на прием к врачу</h3>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            {{ form.as_p }}
        </div>

        <!-- Скрываем поле пациента -->
        {{ form.patient.as_hidden }}

        <button type="submit" class="btn btn-primary">Записаться</button>
        <a href="{% url 'users:profile' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<style>
    .form-group {
        margin-bottom: 15px;
    }
    
    label {
        font-weight: bold;
    }
    
    .form-control {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
    }
</style>
{% endblock %}
